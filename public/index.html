<!DOCTYPE html>
<html>
<head>
  <title>OpenLease</title>
  <style>
    body {
      font-family: Arial;
      margin: 40px;
      background: #f4f4f4;
    }

    h1 {
      color: #333;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <h1>OpenLease Property Dashboard</h1>

  <div id="units"></div>

  <script>
    async function loadUnits() {
      const response = await fetch('/api/units');
      const units = await response.json();

      const container = document.getElementById('units');

      units.forEach(unit => {
        const div = document.createElement('div');
        div.className = 'card';

        div.innerHTML = `
          <h3>Unit ${unit.unit}</h3>
          <p><strong>Tenant:</strong> ${unit.tenant}</p>
          <p><strong>Rent:</strong> $${unit.rent}</p>
          <p><strong>Status:</strong> ${unit.status}</p>
        `;

        container.appendChild(div);
      });
    }

    loadUnits();
  </script>
</body>
</html>
